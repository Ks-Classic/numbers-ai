name: データ自動更新

on:
  workflow_dispatch:
    inputs:
      round_number:
        description: '目標回号（前回・前々回のデータを取得）'
        required: false
        type: number

permissions:
  contents: write # コミット・プッシュに必要

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Python環境をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: |
          pip install requests beautifulsoup4

      - name: 最新データを取得
        run: |
          cd scripts/production
          if [ -n "${{ github.event.inputs.round_number }}" ]; then
            echo "目標回号: ${{ github.event.inputs.round_number }}"
            python3 fetch_latest_simple.py ${{ github.event.inputs.round_number }}
          else
            python3 fetch_latest_simple.py
          fi

      - name: 変更をコミット・プッシュ
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if [ -n "$(git status --porcelain data/past_results.csv)" ]; then
            git add data/past_results.csv
            git commit -m "chore: データ自動更新 [skip ci]"
            git push
            echo "✅ データを更新してコミットしました"
          else
            echo "ℹ️ 更新するデータがありませんでした"
          fi

      - name: 更新結果を通知
        if: failure()
        run: |
          echo "❌ データ更新に失敗しました"
